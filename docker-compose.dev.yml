services:
  postgres:
    image: postgres:15
    container_name: sourcelens_postgres
    environment:
      POSTGRES_USER: sourcelens
      POSTGRES_PASSWORD: sourcelens_dev
      POSTGRES_DB: sourcelens_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcelens -d sourcelens_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      args:
        PROFILE: dev
    container_name: sourcelens_backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://sourcelens:sourcelens_dev@postgres:5432/sourcelens_db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      ENVIRONMENT: development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - dev

  frontend:
    build:
      context: ./frontend
      args:
        PROFILE: dev
    container_name: sourcelens_frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    profiles:
      - dev

volumes:
  postgres_data:
    driver: local
