# Alembic Configuration File
# This file is the config for Alembic - A lightweight database migration tool for SQLAlchemy.

[alembic]
# path to migration scripts
script_location = .

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename.
# string value is passed to the `timezone` constructor of python-dateutil.tz
# Leave empty for localtime
# timezone =

# max length of characters to apply to the
# "slug" field that's auto-generated by the revision ID
# mechanism. By default this is capped at 40
# characters and results in the following migen revision filenames:
# abc1234567_do_something.py
# you can increase this to fully take advantage of the
# "slug" field naming feature
# metadata_target_revision_suffix =

# Define loggers
sqlalchemy.url = driver://user:password@localhost/dbname

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
