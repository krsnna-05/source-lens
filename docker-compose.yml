services:
  postgres:
    image: postgres:15
    container_name: sourcelens_postgres
    environment:
      POSTGRES_USER: sourcelens
      POSTGRES_PASSWORD: sourcelens_dev
      POSTGRES_DB: sourcelens_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sourcelens -d sourcelens_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
